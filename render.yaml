services:
  - type: web
    name: ecommaxxing-admin
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ADMIN_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
